<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <!-- Added proper form element with id and name attributes -->
    <form id="weatherForm" class="weather-form">
      <label for="cityInput" class="visually-hidden">Enter city or country</label>
      <input 
        type="text" 
        id="cityInput" 
        name="city" 
        class="city-country-input" 
        placeholder="Enter city/country" 
        required
        autocomplete="off"
      >
      <button type="submit" class="weatherForm">Get Weather</button>
    </form>
    <!-- Weather results will be displayed here -->
    <div id="weatherDisplay"></div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
